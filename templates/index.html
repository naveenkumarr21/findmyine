<!DOCTYPE html>
<html>
<head>
    <title>Location Sharing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="text-align:center; font-family:Arial; margin-top:50px;">

    <h2>📍 Share Your Location</h2>
    <p>Please allow location access to continue</p>

    <button onclick="shareLocation()" style="padding:10px 20px; font-size:16px;">
        Share Location
    </button>

    <p id="status"></p>

    <script>
       function shareLocation() {
    if (navigator.geolocation) {
        document.getElementById("status").innerText = "Getting location...";

        navigator.geolocation.getCurrentPosition(
            function(position) {
                console.log("Accuracy:", position.coords.accuracy);

                fetch('/location', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    })
                }).then(() => {
                    document.getElementById("status").innerText = "Location shared successfully ✅";
                });
            },
            function(error) {
                document.getElementById("status").innerText = "Permission denied ❌";
                console.log(error);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    } else {
        document.getElementById("status").innerText = "Geolocation not supported";
    }
}

    </script>

</body>
</html>
